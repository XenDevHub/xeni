# XENI AI — Production Operations Compose File
# Overrides local contexts to leverage GHCR deployment images
# Usage (Automated in Actions): docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  gateway:
    image: ghcr.io/xendevhub/xeni/gateway:latest
    build: null
    profiles: []
    restart: always
    env_file:
      - ./gateway/.env

  frontend:
    image: ghcr.io/xendevhub/xeni/frontend:latest
    build: null
    profiles: []
    restart: always
    env_file:
      - ./frontend/.env

  worker-conversation:
    image: ghcr.io/xendevhub/xeni/workers:latest
    build: null
    profiles: []
    restart: always

  worker-order:
    image: ghcr.io/xendevhub/xeni/workers:latest
    build: null
    profiles: []
    restart: always

  worker-inventory:
    image: ghcr.io/xendevhub/xeni/workers:latest
    build: null
    profiles: []
    restart: always

  worker-creative:
    image: ghcr.io/xendevhub/xeni/workers:latest
    build: null
    profiles: []
    restart: always

  worker-intelligence:
    image: ghcr.io/xendevhub/xeni/workers:latest
    build: null
    profiles: []
    restart: always
