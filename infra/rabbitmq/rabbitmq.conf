# ============================================================
# RabbitMQ Configuration — XENI AI E-Commerce Command Center
# ============================================================

# Load pre-declared topology (exchanges, queues, bindings)
management.load_definitions = /etc/rabbitmq/definitions.json

# Default vhost
default_vhost = xeni_vhost

# Logging
log.console = true
log.console.level = info

# Memory & disk limits
vm_memory_high_watermark.relative = 0.7
disk_free_limit.relative = 1.5

# Connection limits
channel_max = 128

# Heartbeat (seconds)
heartbeat = 60
