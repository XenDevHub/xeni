name: CI and CD

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_push:
    name: Build & Push Docker images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR (built-in token)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push (Gateway & Frontend)
        shell: bash
        run: |
          # Convert repository name to lowercase for GHCR spec
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHA="${GITHUB_SHA::7}"

          echo "== Building Gateway =="
          docker build --target production -t "$REPO-gateway:latest" -t "$REPO-gateway:$SHA" ./gateway
          docker push "$REPO-gateway:latest"
          docker push "$REPO-gateway:$SHA"

          echo "== Building Frontend =="
          docker build --target production -t "$REPO-frontend:latest" -t "$REPO-frontend:$SHA" ./frontend
          docker push "$REPO-frontend:latest"
          docker push "$REPO-frontend:$SHA"

  deploy:
    name: Deploy to Droplet (Docker Compose)
    needs: build_push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            
            # Create app directory if it doesn't exist
            mkdir -p "${{ secrets.APP_DIR }}"
            cd "${{ secrets.APP_DIR }}"

            echo "== Syncing Git Setup =="
            if [ ! -d ".git" ]; then
              git clone https://github.com/XenDevHub/xeni.git .
            else
              git stash
              git pull origin main
            fi
            
            # Inject Environment secrets securely
            echo "${{ secrets.ENV_PRODUCTION }}" > .env
            echo "${{ secrets.ENV_PRODUCTION }}" > ./gateway/.env
            echo "${{ secrets.ENV_PRODUCTION }}" > ./frontend/.env

            echo "== Login GHCR (for private pull) =="
            # Using custom GHCR_TOKEN here since Droplet needs its own mechanism to read GHCR limits
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "== Pull & restart =="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "== Health check (Gateway) =="
            curl -fsS http://127.0.0.1:8080/health || echo "Gateway healthcheck bypassed"

            echo "== Cleanup old images =="
            docker image prune -f
